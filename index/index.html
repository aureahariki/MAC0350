<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Jupiterweb</title>
</head>
<body>
    <div class="header">
      <a href="http://www.usp.br/">
        <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo.png" alt="logo USP">
        <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png" alt="Universidade de São Paulo">
      </a>
      <div class="banner">
        <div id="laranja"></div>
        <div id="azulClaro"></div>
        <div id="turquesa"></div>
      </div>
    </div>
    <div class="main">
      <div class="nav">
        <div id="menuPublico">
          <select name="calendario">
            <option value="">Calendário Escolar</option>
            <option value="2025"><a href="https://uspdigital.usp.br/jupiterweb/jupArquivosPublicos.jsp?tiparq=8&anoprg=2025&codmnu=7920">2025</a></option>
            <option value="2026"><a href="https://uspdigital.usp.br/jupiterweb/jupArquivosPublicos.jsp?tiparq=9&anoprg=2026&codmnu=6863">2026</a></option>
          </select>
          <a href="https://uspdigital.usp.br/jupiterweb/jupCarreira.jsp?codmnu=8275">Cursos de Ingresso</a>
          <select name="disciplina">
            <option value="">Disciplinas</option>
            <option value="Disciplinas"><a href="https://uspdigital.usp.br/jupiterweb/jupDisciplinaBusca?tipo=D&codmnu=6755">Busca por Disciplinas</a></option>
            <option value="Turmas"><a href="https://uspdigital.usp.br/jupiterweb/jupDisciplinaBusca?tipo=T&codmnu=6756">Busca por Turmas</a></option>
          </select>
          <select name="Editais">
            <option value="">Editais</option>
            <option value="PUB"><select name="PUB">
              <option value="">Programa Unificado de Bolsas (PUB)</option>
              <option value="2024"><a href="https://uspdigital.usp.br/juno/bnfArquivosPublicos.jsp?tiparq=1&anoprg=2024&codm?codmnu=10872">Edital 2024/2025</a></option>
              <option value="2025"><a href="https://uspdigital.usp.br/juno/bnfArquivosPublicos.jsp?tiparq=1&anoprg=2025&codm?codmnu=11502">Edital 2025/2026</a></option>
            </select></option>
            <option value="PEEG"><a href="http://www.prg.usp.br/?page_id=399?codmnu=6762">PEEG</a></option>
            <option value="PAP"><a href="https://prg.usp.br/programas-e-bolsas/?codmnu=10838">PAP</a></option>
          </select>
          <select name="FAQ">
            <option value="">FAQ</option>
            <option value="matricula"><select name="matricula">
              <option value="">Matrícula Interativa<select name="interativa">
                <option value="faq"><a href="https://uspdigital.usp.br/jupiterweb/FAQ.jsp?codmnu=9326">FAQ</a></option>
                <option value="info"><a href="https://uspdigital.usp.br/jupiterweb/grdMatriculainterativaInformacoes.jsp?codmnu=9327">Informações Gerais</a></option>
                <option value=""><a href="https://uspdigital.usp.br/jupiterweb/graduacaoAjudaNovaMatricula?codmnu=8946">TUTORIAL - NOVA MATRÍCULA</a></option>
              </select></option>
              <option value="videos"><a href="http://www.prg.usp.br/?p=20746&codmnu=6749">Jupiterweb em Vídeos</a></option>
              <option value="Info"><a>Informações gerais sobre a Graduação</a></option>
            </select></option>
          </select>
        </div>        
        <div id="menuRestrito">
          Acesso Restrito
        </div>
      </div>
      <div class="formulario">
        <p>Login</p>
        <div id="linha"></div>
        <form class="login">
          <input type="text" placeholder="Usuário" name="user">
          <input type="password" placeholder="Senha" name="senha">
          <input type="submit" placeholder="Entrar" name="entrar">
        </form>
        <div id="linha"></div>
        
      </div>
    </div>
</body>
</html>
